<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Multi Theme CV Generator</title>
<script src="data.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link rel="stylesheet" href="base.css">
<link rel="stylesheet" id="themeStylesheet" href="./apple.css">
</head>

<body>

<nav class="navbar bg-white shadow-sm sticky-top">
    <div class="container">

        <h4 class="mb-0 main-title">CV Generator</h4>

        <select id="themeSelector" class="form-select w-auto">

            <option value="apple">Apple</option>
            <option value="notion">Notion</option>
            <option value="linkedin">LinkedIn</option>
            <option value="creative">Creative</option>
            <option value="ats">ATS</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="material">Material</option>

        </select>
<div class="container ">
      <button class="btn btn-info" onclick="saveProfile()">💾 Save</button>
  <button class="btn btn-info" onclick="loadProfile()">📂 Load</button>
  <button class="btn btn-info" onclick="exportPDF()">📄 Export PDF</button>

</div>
    </div>
</nav>

<div class="container py-4">

    <div id="cvContainer"></div>

</div>

<script src="themes.js"></script>
<script src="renderer.js"></script>

</body>
</html>
