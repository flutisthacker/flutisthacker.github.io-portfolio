<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body>
    <div class="row m-1">

    </div>
</body>
<script>
    let cards=[{img:"",title:"project 1",desc:"sasd",btn:"",id:"0",status:""},
    {img:"",title:"project 2",desc:"asd",btn:"",id:"1",status:""},
    {img:"",title:"project 3",desc:"asd",btn:"",id:"2",status:""}]
    let columnscolors=["primary","info","danger","warning"];
    let mycolumns=["To do","Develop","Testing","Deployed"]
    mycolumns.forEach((x,i)=>{
        document.querySelector(".row").innerHTML+=`<div class="col-3 bg-${columnscolors[i]}" id="${x}"><h1>${x}</h1></div>`
    })
    cards.forEach((card,i)=>{
        document.querySelector(".col-3").innerHTML+=`<div class="card m-1" draggable="true" data-id="${card.id||i}" style="width: 18vw;">
             <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" onclick="this.parentElement.remove()">
    x
    <span class="visually-hidden">unread messages</span>
  </span>
  <img src="..." class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">${card.title} ${i}</h5>
    <p class="card-text">${card.desc}</p>
    <a href="#" class="btn btn-primary">comments</a>
  </div>
</div>`
    })
    const cardRow=document.querySelector(".row");
    let card;
    const columns=document.querySelectorAll(".col-3");
    const preview=document.querySelector("#drag-preview")
    let dragId=null;
    
    cardRow.addEventListener("dragstart",e=>{
        card=e.target.closest(".card");
        if(!card) return;
        dragId=card.dataset.id;
        card.classList.add("lifted");
    })

    cardRow.addEventListener("dragover",e=>{
        e.preventDefault();
    })
    cardRow.addEventListener("drop",e=>{
        column=e.target.closest(".col-3");
        column.appendChild(card)
        cards[dragId].status=column.id;
    })

    cardRow.addEventListener("dragenter",e=>{
        column=e.target.closest(".col-3");
        column.classList.add("border");
        column.classList.add("border-primary");
    })
    cardRow.addEventListener("dragleave",e=>{
        column=e.target.closest(".col-3");
        column.classList.remove("border");
        column.classList.remove("border-primary");
    })
</script>
</html>
