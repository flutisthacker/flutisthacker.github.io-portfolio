<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <input type="number" id="salaryA" min="0" class="form-control" placeholder="salary amount">
    <input type="number" id="salaryB" min="0" class="form-control" placeholder="salary amount">
    <button class="btn btn-info" onclick="cal()">calculate</button>
    <input type="number" id="salary" min="0" class="form-control" placeholder="salary amount">
    <table class="myValues">
        <thead><tr></tr></thead>
        <tbody></tbody>
    </table>
</body>
<script>
    
let mySalary=document.querySelector("#salary")
mapSal={
"essentials":{
    "head":50,
"rent":30,
"groceries":20,
"transportation":10,
"insurance and emi":20,
"healthcare":5,
"others":15,

},
"wants":{"head":30,
"shopping":30,
"dining and entertainment":30,
"subscription activities":20,
"travel and holidays":10,
"misc wants":10,

},
"savings":{"head":20,
"emergency fund contribution":25,
"retiirement planning":40,
"child planning":15,
"home planning":10,
"other investment":10,

},

}
function cal(){
let mySalaryA=parseInt(document.querySelector("#salaryA").value)
let mySalaryB=parseInt(document.querySelector("#salaryB").value)    
total=mySalaryA+mySalary;
console.log(total)
mySalary.value=(mySalaryA/total*100)+(mySalaryB/total*100) || total
}
mySalary.addEventListener("keypress",e=>{
    if(e.key=="Enter"){
        myvalue=mySalary.value
        Object.keys(mapSal).map(x=>{
            myHeadvalue=Math.floor(mapSal[x].head*mySalary.value/100)
            Object.keys(mapSal[x]).map((y,i)=>{
                if(i>0){
                    document.querySelector(".myValues>tbody").innerHTML+=`<tr><td>${y}</td><td>${Math.floor(mapSal[x][y]/100*myHeadvalue)}</td></tr>`
                }
                else{
                    document.querySelector(".myValues>tbody").innerHTML+=`<tr><th>${x}</th><th>${myHeadvalue}</th></tr>`
                }
            })
        })
    }
})
</script>
</html>
