<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <nav class="navbar fixed-bottom navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Finance</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <div class="d-flex">
        <input type="number" id="salaryA" min="0" class="form-control me-2" placeholder="Salary amount Person A">
        <input type="number" id="salaryB" min="0" class="form-control me-2" placeholder="Salary amount Person B">
        <input type="number" id="salary" min="0" class="form-control me-2" placeholder="Total Salary amount">
        <button class="btn btn-info" onclick="cal()" oncontextmenu="cal2(this)">calculate</button>
      </div>
    </div>
  </div>
</nav>
    <table class="myValues table table-hover">
        <tbody></tbody>
        <tfoot></tfoot>
    </table>
</body>
<script>
    
let mySalary=document.querySelector("#salary")
let SalaryA=document.querySelector("#salary")
let SalaryB=document.querySelector("#salary")
mapSal={
"essentials":{
    "head":50,
"rent":30,
"groceries":20,
"transportation":10,
"insurance and emi":20,
"healthcare":5,
"others":15,

},
"wants":{"head":30,
"shopping":30,
"dining and entertainment":30,
"subscription activities":20,
"travel and holidays":10,
"misc wants":10,

},
"savings":{"head":20,
"emergency fund contribution":25,
"retiirement planning":40,
"child planning":15,
"home planning":10,
"other investment":10,

},

}
function cal(){
let mySalaryA=parseInt(salaryA.value)
let mySalaryB=parseInt(salaryB.value)    
total=mySalaryA+mySalaryB;
console.log(total)
incomeRatioA=Math.round(mySalaryA/total*100)
incomeRatioB=Math.round(mySalaryB/total*100)
incomeSaveA=Math.round(incomeRatioA/100*mySalaryA)
incomeSaveB=Math.round(incomeRatioB/100*mySalaryB)
document.querySelector(".myValues>tfoot").innerHTML+=`<tr><th>Income</th></tr><tr><td>income Ratio A</td><td>${incomeRatioA}%</td></tr>
<tr><td>income Ratio B</td><td>${incomeRatioB}%</td></tr>
<tr><td>income save A</td><td>NPR ${incomeSaveA}</td></tr>
<tr><td>income save B</td><td>NPR ${incomeSaveB}</td></tr>`
mySalary.value=parseInt(incomeSaveA+incomeSaveB) || total
}
mySalary.addEventListener("keypress",e=>{
    if(e.key=="Enter"){
        cal2();
    }
})

function cal2(){
            myvalue=mySalary.value
        Object.keys(mapSal).map(x=>{
            myHeadvalue=Math.floor(mapSal[x].head*mySalary.value/100)
            Object.keys(mapSal[x]).map((y,i)=>{
                if(i>0){
                    document.querySelector(".myValues>tbody").innerHTML+=`<tr><td>${y}</td><td>NPR ${Math.floor(mapSal[x][y]/100*myHeadvalue)}</td></tr>`
                }
                else{
                    document.querySelector(".myValues>tbody").innerHTML+=`<tr class="table-dark"><th>${x}</th><th>NPR ${myHeadvalue}</th></tr>`
                }
            })
        })
}
</script>
</html>
