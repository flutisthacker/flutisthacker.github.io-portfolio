 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View CV</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="https://shayartohnahi.pages.dev/bootstrapFunctions.js"></script>

 </head>
 <body>
<div class="container">
        <div class="row">
                <div class="col-12">
                        <div class="personal"></div>
                        <div class="summary"></div>
                        <div class="links"></div>

                </div>
                <div class="col-6">
                        <div class="awards"></div>
                        <div class="skills"></div>
                        <div class="language"></div>
                        <div class="education"></div>
                        <div class="references"></div>

                </div>
                <div class="col-6">
                        <div class="experience"></div>
                        <div class="training"></div>
                        <div class="projects_involved"></div>

                </div>
        </div>
</div>    

 </body>
 <script>
    let myData;
      const fetchSomeData=async (uMethod,url)=>{
        fetch(url, {
              method: uMethod, // Method: POST
              headers: {
              'Content-Type': 'application/json', // Send data as JSON
              }
              })
              .then(response => {
              if (!response.ok) {
              throw new Error('Network response was not ok');
              }
              return response.json(); // Parse the JSON response from the server
              })
              .then(data => {
              console.log(data)
              myData=data
                Object.keys(myData).forEach(x=>{
                        console.log(x,myData[x])
                        if(typeof(myData[x])=="object" && !Array.isArray(myData[x])){
                                newArr=Object.entries(myData.personal).map(x=> x[0]+":"+x[1])
                                // $("."+x).innerHTML+=JSON.stringify(myData[x])
                                AddToComponent("."+x,createListGroup(newArr,true,false,"info"))
                        } else if(Array.isArray(myData[x])){
                                // $("."+x).innerHTML+=myData[x].join("---")
                                AddToComponent("."+x,createListGroup(myData[x],true,false,"info"))
                        }else{
                                $("."+x).innerHTML+=myData[x]
                        }
                })
              })    
              .catch((error) => {
              console.error('There was a problem with the fetch operation:', error); // Handle errors
                  });
          
          }
          let [searchTerm,searchNote]=location.search.split("=")
          fetchSomeData("GET","/resumes/"+searchNote ||"saman")
 </script>
 </html>
