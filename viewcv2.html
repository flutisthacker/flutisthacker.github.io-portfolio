<style>
body{
    background:#f4f7fb;
    font-family:'Segoe UI',sans-serif;
}

.cv-container{
    max-width:1200px;
    margin:30px auto;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.08);
}

.sidebar{
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    padding:30px;
    height:100%;
}

.sidebar h5{
    border-bottom:1px solid rgba(255,255,255,.2);
    padding-bottom:10px;
    margin-top:25px;
}

.main-content{
    padding:35px;
}

.name{
    font-size:2.4rem;
    font-weight:700;
}

.position{
    color:#64748b;
    font-size:1.2rem;
}

.section-title{
    font-weight:700;
    margin-bottom:20px;
    color:#0f172a;
    position:relative;
}

.section-title::after{
    content:'';
    width:60px;
    height:3px;
    background:#0d6efd;
    position:absolute;
    bottom:-8px;
    left:0;
}

.skill-badge{
    margin:4px;
    font-size:.85rem;
}

.timeline-item{
    position:relative;
    padding-left:30px;
    margin-bottom:30px;
    border-left:2px solid #dee2e6;
}

.timeline-item::before{
    content:'';
    width:12px;
    height:12px;
    background:#0d6efd;
    border-radius:50%;
    position:absolute;
    left:-7px;
    top:5px;
}

.logo{
    width:55px;
    height:55px;
    object-fit:contain;
    border-radius:10px;
    background:#fff;
    border:1px solid #eee;
    padding:5px;
}

.social-links a{
    color:white;
    margin-right:12px;
    font-size:1.2rem;
}

.reference-card{
    background:#f8fafc;
    border-radius:10px;
    padding:15px;
}

@media print{
    body{
        background:white;
    }

    .cv-container{
        box-shadow:none;
    }
}
</style>
</head>

<section class="mt-5">
