
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modern CV</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>
body{
    background:#f4f7fb;
    font-family:'Segoe UI',sans-serif;
}

.cv-container{
    max-width:1200px;
    margin:30px auto;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.08);
}

.sidebar{
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    padding:30px;
    height:100vh;
    overflow-y: scroll;
}

.sidebar h5{
    border-bottom:1px solid rgba(255,255,255,.2);
    padding-bottom:10px;
    margin-top:25px;
}

.main-content{
    padding:35px;
    height: 100vh   ;
    overflow-y: scroll;
}

.name{
    font-size:2.4rem;
    font-weight:700;
}

.position{
    color:#64748b;
    font-size:1.2rem;
}

.section-title{
    font-weight:700;
    margin-bottom:20px;
    color:#0f172a;
    position:relative;
}

.section-title::after{
    content:'';
    width:60px;
    height:3px;
    background:#0d6efd;
    position:absolute;
    bottom:-8px;
    left:0;
}

.skill-badge{
    margin:4px;
    font-size:.85rem;
}

.timeline-item{
    position:relative;
    padding-left:30px;
    margin-bottom:30px;
    border-left:2px solid #dee2e6;
}

.timeline-item::before{
    content:'';
    width:12px;
    height:12px;
    background:#0d6efd;
    border-radius:50%;
    position:absolute;
    left:-7px;
    top:5px;
}

.logo{
    width:55px;
    height:55px;
    object-fit:contain;
    border-radius:10px;
    background:#fff;
    border:1px solid #eee;
    padding:5px;
}

.social-links a{
    color:white;
    margin-right:12px;
    font-size:1.2rem;
}

.reference-card{
    background:#f8fafc;
    border-radius:10px;
    padding:15px;
}

@media print{
    body{
        background:white;
    }

    .cv-container{
        box-shadow:none;
    }
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="cv-container">

<div class="row g-0">

<!-- SIDEBAR -->
<div class="col-lg-4 sidebar">

<h1 id="name"></h1>
<p id="position"></p>

<div class="mt-4">
<p><i class="fas fa-phone"></i> <span id="contact"></span></p>
<p><i class="fas fa-envelope"></i> <span id="email"></span></p>
<p><i class="fas fa-location-dot"></i> <span id="location"></span></p>
</div>

<div class="social-links mt-4" id="socialLinks"></div>

<h5>Skills</h5>
<div id="skills"></div>

<h5>Languages</h5>
<ul id="languages"></ul>

<h5>Awards</h5>
<div id="awards"></div>

</div>

<!-- MAIN CONTENT -->
<div class="col-lg-8 main-content">

<section>
<h3 class="section-title">Profile</h3>
<p id="summary"></p>
</section>

<section class="mt-5">
<h3 class="section-title">Experience</h3>
<div id="experience"></div>
</section>

<section class="mt-5">
<h3 class="section-title">Projects</h3>
<div id="projects"></div>
</section>

<section class="mt-5">
<h3 class="section-title">Training</h3>
<div id="training"></div>
</section>

<section class="mt-5">
<h3 class="section-title">Education</h3>
<div id="education"></div>
</section>

<section class="mt-5">
<h3 class="section-title">References</h3>
<div class="row" id="references"></div>
</section>

</div>

</div>
</div>
</div>

<script>

/************************************************
 JSON DATA
*************************************************/
   let cvData;
      const fetchSomeData=async (uMethod,url)=>{
        fetch(url, {
              method: uMethod, // Method: POST
              headers: {
              'Content-Type': 'application/json', // Send data as JSON
              }
              })
              .then(response => {
              if (!response.ok) {
              throw new Error('Network response was not ok');
              }
              return response.json(); // Parse the JSON response from the server
              })
              .then(data => {
              cvData=data
              UpdateData(data)
              })    
              .catch((error) => {
              console.error('There was a problem with the fetch operation:', error); // Handle errors
                  });
          
          }
          let [searchTerm,searchNote]=location.search.split("=")
          fetchSomeData("GET","/resumes/"+searchNote ||"saman")

        function UpdatePersonal(NewData){
            /************************************************
         PERSONAL
        *************************************************/
        document.getElementById('name').textContent =NewData.title;
        
        document.getElementById('position').textContent =NewData.position;
        
        document.getElementById('contact').textContent =NewData.contact;
        
        document.getElementById('email').textContent =NewData.email;
        
        document.getElementById('location').textContent =NewData.location;
        
        document.getElementById('summary').textContent =
        cvData.summary;
        }
function updateSkills(DOM,NewData){
    document.getElementById(DOM).innerHTML =
    NewData.map(skill => `
    <span class="badge bg-primary skill-badge">${skill}</span>
    `).join('');

}
function UpdateData(cvData){        
UpdatePersonal(cvData.personal)


updateSkills("skills",cvData.skills)
updateSkills("languages",cvData.language)
/************************************************
 LANGUAGES
*************************************************/
document.getElementById('languages').innerHTML =
cvData.language.map(lang => `
<li>${lang}</li>
`).join('');

/************************************************
 SOCIAL LINKS
*************************************************/
const icons = {
facebook:'fab fa-facebook',
x:'fab fa-x-twitter',
instagram:'fab fa-instagram',
linkedin:'fab fa-linkedin',
youtube:'fab fa-youtube'
};

let socialHTML='';

Object.entries(cvData.links).forEach(([key,value])=>{

if(Array.isArray(value)) return;

socialHTML += `
<a href="${value}" target="_blank">
<i class="${icons[key]}"></i>
</a>
`;

});

document.getElementById('socialLinks').innerHTML =
socialHTML;

/************************************************
 AWARDS
*************************************************/
document.getElementById('awards').innerHTML =
cvData.awards.map(item=>`
<div class="mb-3">
<strong>${item.title}</strong><br>
<small>${item.location}</small><br>
<span>${item.date}</span>
</div>
`).join('');

/************************************************
 EXPERIENCE
*************************************************/
document.getElementById('experience').innerHTML =
cvData.experience.map(exp=>{

const points = exp.points
? exp.points.split('||').map(p=>`<li>${p}</li>`).join('')
: '';

return `
<div class="timeline-item">

<div class="d-flex gap-3">

${exp.logo ? `
<img src="${exp.logo}" class="logo">
` : ''}

<div>

<h5>${exp.title}</h5>
<div class="text-muted mb-2">
${exp.date} • ${exp.location}
</div>

<p>${exp.description}</p>

<ul>
${points}
</ul>

</div>

</div>

</div>
`;
}).join('');

/************************************************
 PROJECTS
*************************************************/
document.getElementById('projects').innerHTML =
cvData["projects involved"].map(project=>`
<div class="timeline-item">
<h5>${project.title}</h5>
<div class="text-muted">
${project.date}
</div>
<a href="${project.location}" target="_blank">
${project.location}
</a>
<p>${project.description}</p>
</div>
`).join('');

/************************************************
 TRAINING
*************************************************/
document.getElementById('training').innerHTML =
cvData.training.map(item=>`
<div class="timeline-item">
<h5>${item.title}</h5>
<div class="text-muted">
${item.date} • ${item.location}
</div>
<p>${item.description}</p>
</div>
`).join('');

/************************************************
 EDUCATION
*************************************************/
document.getElementById('education').innerHTML =
cvData.education.map(item=>`
<div class="timeline-item">

<div class="d-flex gap-3">

${item.logo ? `
<img src="${item.logo}" class="logo">
` : ''}

<div>
<h5>${item.title}</h5>

<strong>${item.name}</strong>

<div class="text-muted">
${item.date} • ${item.location}
</div>

<p>${item.description}</p>

<span class="badge bg-success">
Marks: ${item.marks}
</span>

</div>

</div>

</div>
`).join('');

/************************************************
 REFERENCES
*************************************************/
document.getElementById('references').innerHTML =
cvData.references.map(ref=>`
<div class="col-md-6 mb-3">

<div class="reference-card">

<h6>${ref.name}</h6>

<p class="mb-1">
${ref.title}
</p>

<p class="mb-1">
${ref.company}
</p>

<p class="mb-1">
${ref.email}
</p>

<p class="mb-0">
${ref.phone}
</p>

</div>

</div>
`).join('');

}
</script>

</body>
</html>
