<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visiting Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Montserrat&family=Roboto&family=Lato&family=Playfair+Display&family=Oswald&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* OPEN BUTTON */

.open-btn{
position:fixed;
top:20px;
left:20px;
padding:10px 15px;
background:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* OFFCANVAS */

.offcanvas{
position:fixed;
left:-420px;
top:0;
width:320px;
height:100%;
background:white;
color:black;
padding:20px;
transition:.4s;
overflow:auto;
box-shadow:3px 0 10px rgba(0,0,0,.3);
}

.offcanvas.active{
left:0;
}

.offcanvas input,
.offcanvas select{
width:100%;
margin:6px 0;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.close-btn{
float:right;
cursor:pointer;
font-size:20px;
}

/* CARD */

.card{ width:90vw; max-width:350px; aspect-ratio:3.5/2; padding:16px; border-radius:14px; color:white; position:relative; margin:auto; }


@media (max-width:600px){

.card{
width:92vw;
padding:12px;
}

.name{
font-size:18px;
}

.title{
font-size:12px;
}

.contact{
font-size:11px;
}

.logo{
width:32px;
height:32px;
}

#qrcode{
width:55px;
height:55px;
}
.offcanvas{ width:85vw; z-index: 20;}
}


/* TEMPLATES */

.template1{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.3);
}

.template2{
background:#111;
border:2px solid #444;
}

.template3{
background:linear-gradient(135deg,#ff7e5f,#feb47b);
}

.template20{background:linear-gradient(135deg,#667eea,#764ba2);} .template21{background:#1e1e1e;} .template22{background:linear-gradient(135deg,#ff7e5f,#feb47b);} .template4{background:#0f2027;} .template5{background:linear-gradient(135deg,#11998e,#38ef7d);} .template6{background:#3a1c71;} .template7{background:linear-gradient(135deg,#ee0979,#ff6a00);} .template8{background:#2c3e50;} .template9{background:linear-gradient(135deg,#4568dc,#b06ab3);} .template10{background:#232526;} .template11{background:linear-gradient(135deg,#00c6ff,#0072ff);} .template12{background:#141e30;} .template13{background:linear-gradient(135deg,#f7971e,#ffd200);} .template14{background:#000428;} .template15{background:linear-gradient(135deg,#30cfd0,#330867);} .template16{background:#434343;} .template17{background:linear-gradient(135deg,#ff9966,#ff5e62);} .template18{background:#0f0c29;} .template19{background:linear-gradient(135deg,#56ab2f,#a8e063);} .template20{background:#16222a;}
.logo{
width:40px;
height:40px;
object-fit:contain;
}

.name{font-size:22px;margin-top:10px;}
.title{opacity:.8;}

.contact{margin-top:10px;font-size:13px;}

#qrcode{
position:absolute;
bottom:10px;
right:10px;
background:white;
padding:5px;
border-radius:6px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}


.pattern-layer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:.25;
pointer-events:none;
border-radius:14px;
}

/* DOTS */

.pattern-dots{
background-image: radial-gradient(white 1px, transparent 1px);
background-size: 15px 15px;
}

/* GRID */

.pattern-grid{
background-image:
linear-gradient(white 1px, transparent 1px),
linear-gradient(90deg, white 1px, transparent 1px);
background-size:20px 20px;
}

/* DIAGONAL LINES */

.pattern-lines{
background-image: repeating-linear-gradient(
45deg,
white,
white 2px,
transparent 2px,
transparent 12px
);
}

/* CROSS */

.pattern-cross{
background-image:
linear-gradient(white 1px, transparent 1px),
linear-gradient(90deg, white 1px, transparent 1px);
background-size:10px 10px;
}

/* WAVES */

.pattern-waves{
background-image:
radial-gradient(circle at 10px 10px, white 2px, transparent 2px);
background-size:20px 20px;
}

.social-icons{
margin-top:8px;
display:flex;
gap:10px;
font-size:16px;
}

.social-icons a{
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<button class="open-btn" onclick="openPanel()">Edit Card</button>

<!-- OFFCANVAS FORM -->

<div class="offcanvas" id="panel">

<span class="close-btn" onclick="closePanel()">✖</span>

<h3>Edit Visiting Card</h3>

<select id="templateSelect">
<option value="template1">Glass</option>
<option value="template2">Dark</option>
<option value="template3">Gradient</option>
</select>
<label>Primary Color</label> <input type="color" id="colorPicker">

<input id="companyInput" placeholder="Company Name">
<input id="nameInput" placeholder="Name">
<input id="titleInput" placeholder="Job Title">
<input id="phoneInput" placeholder="Phone">
<input id="emailInput" placeholder="Email">
<input id="webInput" placeholder="Website">

<label>Upload Logo</label>
<input type="file" id="logoUpload">

<button onclick="downloadCard()">Download PNG</button>

<label>Background Pattern</label> <select id="patternSelect"> <option value="none">None</option> <option value="dots">Dots</option> <option value="grid">Grid</option> <option value="lines">Diagonal Lines</option> <option value="cross">Cross Pattern</option> <option value="waves">Waves</option> </select>

<label>Pattern Density</label> <input type="range" id="patternDensity" min="5" max="40" value="15">
<button onclick="generateShareLink()">Generate Share Link</button> <input id="shareLink" readonly>

<label>Font Style</label>
<select id="fontSelect">
<option value="Poppins">Poppins</option>
<option value="Montserrat">Montserrat</option>
<option value="Roboto">Roboto</option>
<option value="Lato">Lato</option>
<option value="Playfair Display">Playfair Display</option>
<option value="Oswald">Oswald</option>
</select>
</div>

<!-- CARD -->

<div id="card" class="card template1">
<div id="patternLayer" class="pattern-layer"></div>
<img id="logoImg" class="logo" style="display:none">

<div id="company">Your Company</div>

<div class="name" id="name">John Doe</div>
<div class="title" id="title">Creative Director</div>

<div class="contact">
📞 <span id="phone">123456</span><br>
✉ <span id="email">email@mail.com</span><br>
🌐 <span id="web">website.com</span>
</div>
<div class="social-icons" id="socialIcons"></div>

<div id="qrcode"></div>

</div>

<script>
function generateShareLink(){

const data={
name:document.getElementById("name").textContent,
title:document.getElementById("title").textContent,
phone:document.getElementById("phone").textContent,
email:document.getElementById("email").textContent,
web:document.getElementById("web").textContent
};

const params=new URLSearchParams(btoa(JSON.stringify(data))).toString();
console.log(params)

const link=window.location.origin+window.location.pathname+"?"+params;

document.getElementById("shareLink").value=link;

}

</script>
<script>
window.addEventListener("load",()=>{

const params=new URLSearchParams(atob(JSON.stringify(window.location.search.substr(1))));

if(params.get("name")){

document.getElementById("name").textContent=params.get("name");
document.getElementById("title").textContent=params.get("title");
document.getElementById("phone").textContent=params.get("phone");
document.getElementById("email").textContent=params.get("email");
document.getElementById("web").textContent=params.get("web");

// generateQR();

}

});

</script>
<script>

function updateSocialIcons(){

const icons=document.getElementById("socialIcons");

icons.innerHTML="";

const socials=[
{input:"linkedinInput",icon:"fa-linkedin"},
{input:"twitterInput",icon:"fa-x-twitter"},
{input:"instagramInput",icon:"fa-instagram"},
{input:"facebookInput",icon:"fa-facebook"}
];

socials.forEach(s=>{

let url=document.getElementById(s.input).value;

if(url){

let a=document.createElement("a");
a.href=url;
a.target="_blank";
a.innerHTML=`<i class="fa-brands ${s.icon}"></i>`;

icons.appendChild(a);

}

});

}

document.querySelectorAll("#linkedinInput,#twitterInput,#instagramInput,#facebookInput")
.forEach(el=>el.addEventListener("input",updateSocialIcons));

</script>
<script>
const templateSelect=document.getElementById("templateSelect"); for(let i=1;i<=20;i++){ const option=document.createElement("option"); option.value="template"+i; option.textContent="Template "+i; templateSelect.appendChild(option); }
const fontSelect = document.getElementById("fontSelect");
// const patternSelect = document.getElementById("patternSelect"); 
// const patternLayer = document.getElementById("patternLayer"); patternSelect.addEventListener("change", function(){ patternLayer.className = "pattern-layer"; if(this.value !== "none"){ patternLayer.classList.add("pattern-" + this.value); } });


const patternSelect = document.getElementById("patternSelect");
// const card = document.getElementById("card");

/* Create 100 pattern options */

for(let i=1;i<=100;i++){
let option=document.createElement("option");
option.value=i;
option.textContent="Pattern "+i;
patternSelect.appendChild(option);
}

patternSelect.addEventListener("change",generatePattern);

document.getElementById("patternDensity").addEventListener("input",generatePattern);

function generatePattern(){

let p = patternSelect.value;
let density = document.getElementById("patternDensity").value;

switch(p % 5){

case 0:
card.style.backgroundImage =
`radial-gradient(white 1px, transparent 1px)`;
break;

case 1:
card.style.backgroundImage =
`repeating-linear-gradient(45deg,
rgba(255,255,255,.3) 0px,
rgba(255,255,255,.3) 2px,
transparent 2px,
transparent ${density}px)`;
break;

case 2:
card.style.backgroundImage =
`linear-gradient(rgba(255,255,255,.2) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.2) 1px, transparent 1px)`;
break;

case 3:
card.style.backgroundImage =
`repeating-radial-gradient(circle,
rgba(255,255,255,.25) 0px,
rgba(255,255,255,.25) 2px,
transparent 2px,
transparent ${density}px)`;
break;

case 4:
card.style.backgroundImage =
`repeating-linear-gradient(
0deg,
rgba(255,255,255,.2) 0,
rgba(255,255,255,.2) 2px,
transparent 2px,
transparent ${density}px
)`;
break;

}

card.style.backgroundSize = `${density}px ${density}px`;

}


fontSelect.addEventListener("change", function(){
document.getElementById("card").style.fontFamily = this.value;
});


document.getElementById("colorPicker").addEventListener("input",e=>{ card.style.background=e.target.value; });
/* OFFCANVAS */

function openPanel(){
document.getElementById("panel").classList.add("active");
}

function closePanel(){
document.getElementById("panel").classList.remove("active");
}

/* TEMPLATE SWITCH */

const card=document.getElementById("card");

document.getElementById("templateSelect").addEventListener("change",e=>{
card.className="card "+e.target.value;
});

/* LOGO */

document.getElementById("logoUpload").addEventListener("change",function(){

const reader=new FileReader();

reader.onload=function(e){
const img=document.getElementById("logoImg");
img.src=e.target.result;
img.style.display="block";
}

reader.readAsDataURL(this.files[0]);

});

/* LIVE UPDATE */

const fields=[
["companyInput","company"],
["nameInput","name"],
["titleInput","title"],
["phoneInput","phone"],
["emailInput","email"],
["webInput","web"]
];

let myCardDetails=JSON.parse(localStorage.getItem("VCARD"));
fields.forEach(([input,target])=>{
document.getElementById(input).addEventListener("input",e=>{
document.getElementById(target).textContent=e.target.value;
if(e.key=="Enter")generateQR();
});
document.querySelector(`#${input}`).value=myCardDetails[target]
document.querySelector(`#${target}`).textContent=myCardDetails[target]
});

/* QR */

function generateQR(){

const name=document.getElementById("name").textContent;
const phone=document.getElementById("phone").textContent;
const email=document.getElementById("email").textContent;
const web=document.getElementById("web").textContent;
const company = document.getElementById("company").textContent;
const title = document.getElementById("title").textContent;
const cardDetails={
name:name,
phone:phone,
email:email,
web:web,    
company:company,
title:title
}
localStorage.setItem("VCARD",JSON.stringify(cardDetails))

const vcard=`BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
URL:${web}
END:VCARD`;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:vcard,
width:100,
height:100,
colorDark:"#111111",
correctLevel:QRCode.CorrectLevel.L
});

}

generateQR();

/* DOWNLOAD */

function downloadCard(){

html2canvas(card).then(canvas=>{
const link=document.createElement("a");
link.download="visiting-card.png";
link.href=canvas.toDataURL();
link.click();
});

}

</script>

</body>
</html>
