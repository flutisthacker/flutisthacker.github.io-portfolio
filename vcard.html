<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visiting Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Montserrat&family=Roboto&family=Lato&family=Playfair+Display&family=Oswald&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* OPEN BUTTON */

.open-btn{
position:fixed;
top:20px;
left:20px;
padding:10px 15px;
background:white;
color:black;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* OFFCANVASX */

.offcanvasX{
position:fixed;
left:-420px;
top:0;
width:320px;
height:100%;
background:white;
color:black;
padding:20px;
transition:.4s;
overflow-x:scroll;
box-shadow:3px 0 10px rgba(0,0,0,.3);
z-index: 20;
}

.offcanvasX.active{
left:0;
}

.offcanvasX input,
.offcanvasX select{
width:100%;
margin:6px 0;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.close-btn{
float:right;
cursor:pointer;
font-size:20px;
}

/* CARD */

.card{ 
    width:95vw;
     max-width:350px;
     aspect-ratio:3.9/2;
     padding:16px;
     border-radius:14px;
     color:white;
     position:relative;
     margin:auto;
     perspective:1000px;
    cursor:pointer;
    transition: transform ease-in-out .5s;
 }

 .card:hover{
    transform: rotateZ(1deg) rotateX(20deg);
 }

@media (max-width:600px){

.card{
width:92vw;
padding:12px;
     max-width:350px;
}

#company{
font-size:22px;
font-style: bold;
}
.name{
font-size:18px;
}

.title{
font-size:12px;
}

.contact{
font-size:11px;
}

.logo{
width:32px;
height:32px;
}

#qrcode{
width:55px;
height:55px;
}
.offcanvasX{ width:85vw; z-index: 20;}
}


/* TEMPLATES */

.template1{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.3);
}

.template2{
background:#111;
border:2px solid #444;
}

.template3{
background:linear-gradient(135deg,#ff7e5f,#feb47b);
}

.template20{background:linear-gradient(135deg,#667eea,#764ba2);} .template21{background:#1e1e1e;} .template22{background:linear-gradient(135deg,#ff7e5f,#feb47b);} .template4{background:#0f2027;} .template5{background:linear-gradient(135deg,#11998e,#38ef7d);} .template6{background:#3a1c71;} .template7{background:linear-gradient(135deg,#ee0979,#ff6a00);} .template8{background:#2c3e50;} .template9{background:linear-gradient(135deg,#4568dc,#b06ab3);} .template10{background:#232526;} .template11{background:linear-gradient(135deg,#00c6ff,#0072ff);} .template12{background:#141e30;} .template13{background:linear-gradient(135deg,#f7971e,#ffd200);} .template14{background:#000428;} .template15{background:linear-gradient(135deg,#30cfd0,#330867);} .template16{background:#434343;} .template17{background:linear-gradient(135deg,#ff9966,#ff5e62);} .template18{background:#0f0c29;} .template19{background:linear-gradient(135deg,#56ab2f,#a8e063);} .template20{background:#16222a;}
.logo{
width:40px;
height:40px;
object-fit:contain;
}

#company{
font-size:22px;
font-style: bolder;
font-weight: 800;
}
.name{font-size:18px;margin-top:5px;
font-weight: 600;}
.title{opacity:.8;
font-weight: 400;}
.contact{margin-top:10px;font-size:13px;}

#qrcode{
position:absolute;
bottom:10px;
right:10px;
background:white;
padding:5px;
border-radius:6px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}


.pattern-layer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:.25;
pointer-events:none;
border-radius:14px;
}

/* DOTS */

.pattern-dots{
background-image: radial-gradient(white 1px, transparent 1px);
background-size: 15px 15px;
}

/* GRID */

.pattern-grid{
background-image:
linear-gradient(white 1px, transparent 1px),
linear-gradient(90deg, white 1px, transparent 1px);
background-size:20px 20px;
}

/* DIAGONAL LINES */

.pattern-lines{
background-image: repeating-linear-gradient(
45deg,
white,
white 2px,
transparent 2px,
transparent 12px
);
}

/* CROSS */

.pattern-cross{
background-image:
linear-gradient(white 1px, transparent 1px),
linear-gradient(90deg, white 1px, transparent 1px);
background-size:10px 10px;
}

/* WAVES */

.pattern-waves{
background-image:
radial-gradient(circle at 10px 10px, white 2px, transparent 2px);
background-size:20px 20px;
}

.social-icons{
margin-top:8px;
display:flex;
gap:10px;
font-size:16px;
}

.social-icons a{
color:white;
text-decoration:none;
}

.profile-photo{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
margin-bottom:8px;
margin-left: 20px;
}

</style>
</head>

<body>


<button class="open-btn" oncontextmenu="openPanel()" class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#openPanel" aria-controls="openPanel">
  Edit Card
</button>


<!-- OFFCANVAS FORM -->
<div class="offcanvas offcanvas-start bg-dark text-light" style="width: 50%;"  tabindex="-1" id="openPanel" aria-labelledby="openPanelLabel">
  <div class="offcanvas-header">
    <h3 class="offcanvas-title" id="openPanelLabel">Edit visiting card</h3>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">

<div>
<input class="form-control mb-2" type="text" for="company" name="company" id="companyInput" placeholder="Company Name">
<input class="form-control mb-2" type="text" for="name" name="name" id="nameInput" placeholder="Name">
<input class="form-control mb-2" type="text" for="title" name="title" id="titleInput" placeholder="Job Title">
<input class="form-control mb-2" type="tel" for="phone" name="phone" id="phoneInput" placeholder="Phone">
<input class="form-control mb-2" type="email" for="email" name="email" id="emailInput" placeholder="Email">
<input class="form-control mb-2" type="text" for="web" name="web" id="webInput" placeholder="Website">

<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">LinkedIn</span>
  <input class="form-control" type="text" id="linkedinInput" placeholder="LinkedIn profile URL">
</div>
<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">Twitter / X</span>
 <input class="form-control" type="text" id="twitterInput" placeholder="Twitter profile URL">
</div>
<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">Instagram</span>
     <input class="form-control" type="text" id="instagramInput" placeholder="Instagram profile URL">
</div>
<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">Facebook</span>
 <input class="form-control" type="text" id="facebookInput" placeholder="Facebook profile URL">
</div>

     <button class="btn btn-success" onclick="generateQR()">Add QR</button>
     <button class="btn btn-success" onclick="downloadCard()">Download PNG</button>
    <button class="btn btn-success" onclick="downloadVCard()">Download Contact (.VCF)</button>
<div class="mb-3">
  <label for="logoUpload" class="form-label">Upload Logo</label>
  <input class="form-control" type="file" id="logoUpload" accept="image/*">
</div>
<div class="mb-3">
  <label for="photoInput" class="form-label">Profile Photo / Logo</label>
  <input class="form-control" type="file" id="photoInput" accept="image/*">
</div>

</div>



<div class="settings">
    
<select class="form-select" id="templateSelect">
<option value="template1">Glass</option>
<option value="template2">Dark</option>
<option value="template3">Gradient</option>
</select>
<label>Font Style</label>
<select class="form-select" id="fontSelect">
<option value="Poppins">Poppins</option>
<option value="Montserrat">Montserrat</option>
<option value="Roboto">Roboto</option>
<option value="Lato">Lato</option>
<option value="Playfair Display">Playfair Display</option>
<option value="Oswald">Oswald</option>
</select>
</div>

<label>Background Pattern</label> <select class="form-select" id="patternSelect"> <option value="none">None</option> <option value="dots">Dots</option> <option value="grid">Grid</option> <option value="lines">Diagonal Lines</option> <option value="cross">Cross Pattern</option> <option value="waves">Waves</option> </select>

<label for="patternDensity" class="form-label">Pattern Density</label>
<input type="range" class="form-range" id="patternDensity" min="5" max="40" value="15">

<label for="colorPicker" class="form-label">Primary Color</label>
<input type="color" class="form-control form-control-color" id="colorPicker" value="#563d7c" title="Choose your color">
<div class="input-group mb-3">
    <input type="text" id="shareLink" class="form-control" placeholder="Share Link" aria-label="Username" aria-describedby="basic-addon1">
    <button class="btn btn-outline-info pb-1" onclick="generateShareLink()">Generate Share Link</button> 
    <!-- <input id="shareLink" readonly> -->
  <!-- <span class="input-group-text" id="basic-addon1">@</span> -->
</div>

  </div>
</div>
<div class="offcanvasX" id="panel" >
<span class="close-btn" onclick="closePanel()">✖</span>


</div>

<!-- CARD -->

<div id="card" class="card template1">
<div id="patternLayer" class="pattern-layer"></div>
<img id="logoImg" class="logo" style="display:none">

<div id="company">Your Company</div>

<div class="name" id="name">John Doe</div>
<div class="title" id="title">Creative Director</div>
<img id="cardPhoto" style="display:none" class="profile-photo">

<div class="contact">
    <!-- 📞 ✉ 🌐-->
<i class="fa fa-phone"></i> <span id="phone">123456</span><br>
<i class="fa fa-envelope"></i> <span id="email">email@mail.com</span><br>
<i class="fa-brands fa-edge"></i> <span id="web">website.com</span>
</div>
<div class="social-icons" id="socialIcons"></div>
<div id="qrcode"  data-bs-toggle="modal" data-bs-target="#qrModal"></div>
</div>
<div class="modal fade" id="qrModal" tabindex="-1">
     <div class="modal-dialog modal-dialog-centered modal-xl modal-lg">
     <div class="modal-content text-center">
     <div class="modal-header"> 
        <h5 class="modal-title">Scan Contact QR</h5> 
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button> </div>
         <div class="modal-body">
     <div id="qrModalCode"></div> 
    </div>
 </div>
 </div>
 </div>
<script>
    const $$=z=>document.getElementById(z);
    const $=z=>document.querySelector(z);
    let photoBase64 = "";
     $$("photoInput").addEventListener("change", function(e){ const file = e.target.files[0];
         if(!file) return;
         const reader = new FileReader();
         reader.onload = function(evt){
             // remove prefix "data:image/jpeg;
    // base64," 
        photoBase64 = evt.target.result.split(",")[1];
        // preview image 
        document.getElementById("cardPhoto").style.display="block";
        document.getElementById("cardPhoto").src = evt.target.result;
        };
        reader.readAsDataURL(file);
    });
    

</script>

<script>
// const $=d;
function generateShareLink(){

const data={
name:$$("name").textContent,
title:$$("title").textContent,
phone:$$("phone").textContent,
email:$$("email").textContent,
web:$$("web").textContent
};

const params=new URLSearchParams(btoa(JSON.stringify(data))).toString();
console.log(params)

const link=window.location.origin+window.location.pathname+"?"+params;

$$("shareLink").value=link;

}

</script>
<script>
window.addEventListener("load",()=>{

const params=new URLSearchParams(window.location.search);

if(params.get("name")){

$$("name").textContent=params.get("name");
$$("title").textContent=params.get("title");
$$("phone").textContent=params.get("phone");
$$("email").textContent=params.get("email");
$$("web").textContent=params.get("web");

// generateQR();

}

});

</script>
<script>

function updateSocialIcons(sInputs){

const icons=$$("socialIcons");

icons.innerHTML="";

const socials=[
{input:"linkedinInput",icon:"fa-linkedin"},
{input:"twitterInput",icon:"fa-x-twitter"},
{input:"instagramInput",icon:"fa-instagram"},
{input:"facebookInput",icon:"fa-facebook"}
];

socials.forEach((s,i)=>{

let url=sInputs[i] ||$$(s.input).value;

if(url){

let a=document.createElement("a");
a.href=url;
a.target="_blank";
a.innerHTML=`<i class="fa-brands ${s.icon}"></i>`;

icons.appendChild(a);

}

});

}

document.querySelectorAll("#linkedinInput,#twitterInput,#instagramInput,#facebookInput")
.forEach(el=>el.addEventListener("input",updateSocialIcons));

</script>
<script>
const templateSelect=$$("templateSelect"); for(let i=1;i<=20;i++){ const option=document.createElement("option"); option.value="template"+i; option.textContent="Template "+i; templateSelect.appendChild(option); }
const fontSelect = $$("fontSelect");
// const patternSelect = $$("patternSelect"); 
// const patternLayer = $$("patternLayer"); patternSelect.addEventListener("change", function(){ patternLayer.className = "pattern-layer"; if(this.value !== "none"){ patternLayer.classList.add("pattern-" + this.value); } });


const patternSelect = $$("patternSelect");
// const card = $$("card");

/* Create 100 pattern options */

for(let i=1;i<=100;i++){
let option=document.createElement("option");
option.value=i;
option.textContent="Pattern "+i;
patternSelect.appendChild(option);
}

patternSelect.addEventListener("change",generatePattern);

$$("patternDensity").addEventListener("input",generatePattern);

function generatePattern(){

let p = patternSelect.value;
let density = $$("patternDensity").value;

switch(p % 5){

case 0:
card.style.backgroundImage =
`radial-gradient(white 1px, transparent 1px)`;
break;

case 1:
card.style.backgroundImage =
`repeating-linear-gradient(45deg,
rgba(255,255,255,.3) 0px,
rgba(255,255,255,.3) 2px,
transparent 2px,
transparent ${density}px)`;
break;

case 2:
card.style.backgroundImage =
`linear-gradient(rgba(255,255,255,.2) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.2) 1px, transparent 1px)`;
break;

case 3:
card.style.backgroundImage =
`repeating-radial-gradient(circle,
rgba(255,255,255,.25) 0px,
rgba(255,255,255,.25) 2px,
transparent 2px,
transparent ${density}px)`;
break;

case 4:
card.style.backgroundImage =
`repeating-linear-gradient(
0deg,
rgba(255,255,255,.2) 0,
rgba(255,255,255,.2) 2px,
transparent 2px,
transparent ${density}px
)`;
break;

}

card.style.backgroundSize = `${density}px ${density}px`;

}


fontSelect.addEventListener("change", function(){
$$("card").style.fontFamily = this.value;
});


$$("colorPicker").addEventListener("input",e=>{ card.style.background=e.target.value; });
/* OFFCANVASX */

function openPanel(){
$$("panel").classList.add("active");
}

function closePanel(){
$$("panel").classList.remove("active");
}

/* TEMPLATE SWITCH */

const card=$$("card");

$$("templateSelect").addEventListener("change",e=>{
card.className="card "+e.target.value;
});

/* LOGO */

$$("logoUpload").addEventListener("change",function(){

const reader=new FileReader();

reader.onload=function(e){
const img=$$("logoImg");
img.src=e.target.result;
img.style.display="block";
}

reader.readAsDataURL(this.files[0]);

});

/* LIVE UPDATE */

const fields=[
["companyInput","company"],
["nameInput","name"],
["titleInput","title"],
["phoneInput","phone"],
["emailInput","email"],
["webInput","web"],
];

let myCardDetails=JSON.parse(localStorage.getItem("VCARD"));
fields.forEach(([input,target])=>{
$$(input).addEventListener("input",e=>{
$$(target).textContent=e.target.value;
if(e.key=="Enter"){
    generateQR()
}
});
$(`#${input}`).value=myCardDetails[target]
$(`#${target}`).textContent=myCardDetails[target]
});
// ["linkedinInput","linkedin"],
// ["twitterInput","twitter"],
// ["instagramInput","instagram"],
// ["facebookInput","facebook"],

/* QR */

function generateQR(){

const name=$$("name").textContent;
const phone=$$("phone").textContent;
const email=$$("email").textContent;
const web=$$("web").textContent;
const company = $$("company").textContent;
const title = $$("title").textContent;
const linkedin=$$("linkedinInput").value;
const twitter=$$("twitterInput").value;
const instagram=$$("instagramInput").value;
const facebook=$$("facebookInput").value
const cardDetails={
name:name,
phone:phone,
email:email,
web:web,    
company:company,
title:title,
linkedin:linkedin,
twitter:twitter,
instagram:instagram,
facebook:facebook,
}
localStorage.setItem("VCARD",JSON.stringify(cardDetails))
console.log(cardDetails)

const vcard=`BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
URL:${web}
X-SOCIALPROFILE;TYPE=linkedin:${linkedin}
X-SOCIALPROFILE;TYPE=twitter:${twitter}
X-SOCIALPROFILE;TYPE=instagram:${instagram}
X-SOCIALPROFILE;TYPE=facebook:${facebook}
ORG:${company}
TITLE:${title}
ADR:;;City;State;Country
END:VCARD`;

if(photoBase64){ vcard+=`PHOTO;ENCODING=b;TYPE=JPEG:${photoBase64}\n`; }
localStorage.setItem("VCARData",JSON.stringify(cardDetails))

$$("qrcode").innerHTML="";

new QRCode($$("qrcode"),{
text:vcard,
width:100,
height:100,
colorDark:"#111111",
correctLevel:QRCode.CorrectLevel.L
});

new QRCode($$("qrModalCode"),{
text:vcard,
width:400,
height:400,
colorDark:"#111111",
correctLevel:QRCode.CorrectLevel.L
});

}


/* DOWNLOAD */

function downloadCard(){

html2canvas(card).then(canvas=>{
const link=document.createElement("a");
link.download=company.textContent+"visiting-card.png";
link.href=canvas.toDataURL();
link.click();
});

}
function downloadVCard(){

const vcard = localStorage.getItem("VCARData");

const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
if(navigator.userAgentData.mobile){
    const url=URL.createObjectURL(blob); 
    window.location.href=url;
}else{
    const link = document.createElement("a");
    
    const fileName = document.getElementById("name").textContent || "contact";
    
    link.href = URL.createObjectURL(blob);
    link.download = fileName + ".vcf";
    
    document.body.appendChild(link);
    link.click();
    
    document.body.removeChild(link);    
    }
}

</script>

</body>
</html>
